<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 520" width="820" height="520">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="820" height="520" rx="12" fill="#0d1117"/>

  <!-- Title -->
  <text x="410" y="38" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="500" letter-spacing="0.05em">FOWLER'S TECHNICAL DEBT QUADRANT (2009)</text>

  <!-- Axis labels -->
  <!-- X axis -->
  <text x="270" y="75" text-anchor="middle" fill="#00ff82" font-family="system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="0.08em" filter="url(#glow)">DELIBERATE</text>
  <text x="580" y="75" text-anchor="middle" fill="#00ff82" font-family="system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="0.08em" filter="url(#glow)">INADVERTENT</text>

  <!-- Y axis -->
  <text x="52" y="210" text-anchor="middle" fill="#00ff82" font-family="system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="0.08em" transform="rotate(-90 52 210)" filter="url(#glow)">RECKLESS</text>
  <text x="52" y="400" text-anchor="middle" fill="#00ff82" font-family="system-ui, sans-serif" font-size="13" font-weight="600" letter-spacing="0.08em" transform="rotate(-90 52 400)" filter="url(#glow)">PRUDENT</text>

  <!-- Grid lines -->
  <line x1="100" y1="90" x2="100" y2="490" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <line x1="100" y1="90" x2="750" y2="90" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <line x1="750" y1="90" x2="750" y2="490" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <line x1="100" y1="490" x2="750" y2="490" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <!-- Center lines -->
  <line x1="425" y1="90" x2="425" y2="490" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
  <line x1="100" y1="290" x2="750" y2="290" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>

  <!-- ═══ TOP-LEFT: Reckless-Deliberate ═══ -->
  <rect x="101" y="91" width="323" height="198" fill="rgba(255,60,60,0.06)" rx="0"/>
  <text x="262" y="130" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-family="system-ui, sans-serif" font-size="11" font-weight="400" letter-spacing="0.04em">RECKLESS — DELIBERATE</text>
  <text x="262" y="175" text-anchor="middle" fill="rgba(255,255,255,0.65)" font-family="Georgia, serif" font-size="14" font-style="italic">"We don't have time</text>
  <text x="262" y="197" text-anchor="middle" fill="rgba(255,255,255,0.65)" font-family="Georgia, serif" font-size="14" font-style="italic">for design."</text>
  <text x="262" y="240" text-anchor="middle" fill="rgba(255,100,100,0.8)" font-family="system-ui, sans-serif" font-size="12" font-weight="500">≠ DEBT</text>
  <text x="262" y="262" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-family="system-ui, sans-serif" font-size="11">Negligence with intent</text>

  <!-- ═══ TOP-RIGHT: Reckless-Inadvertent ═══ -->
  <rect x="426" y="91" width="323" height="198" fill="rgba(255,60,60,0.04)" rx="0"/>
  <text x="588" y="130" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-family="system-ui, sans-serif" font-size="11" font-weight="400" letter-spacing="0.04em">RECKLESS — INADVERTENT</text>
  <text x="588" y="175" text-anchor="middle" fill="rgba(255,255,255,0.65)" font-family="Georgia, serif" font-size="14" font-style="italic">"What's</text>
  <text x="588" y="197" text-anchor="middle" fill="rgba(255,255,255,0.65)" font-family="Georgia, serif" font-size="14" font-style="italic">layering?"</text>
  <text x="588" y="240" text-anchor="middle" fill="rgba(255,100,100,0.8)" font-family="system-ui, sans-serif" font-size="12" font-weight="500">≠ DEBT</text>
  <text x="588" y="262" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-family="system-ui, sans-serif" font-size="11">Lack of competence</text>

  <!-- ═══ BOTTOM-LEFT: Prudent-Deliberate ═══ -->
  <rect x="101" y="291" width="323" height="198" fill="rgba(0,255,130,0.06)" rx="0"/>
  <text x="262" y="330" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-family="system-ui, sans-serif" font-size="11" font-weight="400" letter-spacing="0.04em">PRUDENT — DELIBERATE</text>
  <text x="262" y="375" text-anchor="middle" fill="rgba(255,255,255,0.65)" font-family="Georgia, serif" font-size="14" font-style="italic">"We must ship now and</text>
  <text x="262" y="397" text-anchor="middle" fill="rgba(255,255,255,0.65)" font-family="Georgia, serif" font-size="14" font-style="italic">deal with the consequences."</text>
  <text x="262" y="440" text-anchor="middle" fill="rgba(0,255,130,0.9)" font-family="system-ui, sans-serif" font-size="12" font-weight="600" filter="url(#glow)">= TRUE DEBT</text>
  <text x="262" y="462" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-family="system-ui, sans-serif" font-size="11">Conscious tradeoff with repayment plan</text>

  <!-- ═══ BOTTOM-RIGHT: Prudent-Inadvertent ═══ -->
  <rect x="426" y="291" width="323" height="198" fill="rgba(0,255,130,0.03)" rx="0"/>
  <text x="588" y="330" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-family="system-ui, sans-serif" font-size="11" font-weight="400" letter-spacing="0.04em">PRUDENT — INADVERTENT</text>
  <text x="588" y="375" text-anchor="middle" fill="rgba(255,255,255,0.65)" font-family="Georgia, serif" font-size="14" font-style="italic">"Now we know how we</text>
  <text x="588" y="397" text-anchor="middle" fill="rgba(255,255,255,0.65)" font-family="Georgia, serif" font-size="14" font-style="italic">should have done it."</text>
  <text x="588" y="440" text-anchor="middle" fill="rgba(100,180,255,0.8)" font-family="system-ui, sans-serif" font-size="12" font-weight="500">= COST OF LEARNING</text>
  <text x="588" y="462" text-anchor="middle" fill="rgba(255,255,255,0.45)" font-family="system-ui, sans-serif" font-size="11">Unavoidable cost of growing knowledge</text>

  <!-- Source note -->
  <text x="750" y="510" text-anchor="end" fill="rgba(255,255,255,0.2)" font-family="system-ui, sans-serif" font-size="9">Based on: Martin Fowler, "Technical Debt Quadrant" (2009)</text>
</svg>
